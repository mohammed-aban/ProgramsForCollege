<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>text animation</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #text {
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="text"></div>
    <script>
        let text = document.getElementById("text");
        let size = 5;
        let growing = true;
        
        function animateText() {
            if (growing) {
                text.innerHTML = 'text growing';
                text.style.color = 'red';
                size += 5;
                text.style.fontSize = size + "px";

                if (size >= 50) 
                    growing = false;
            }
            else {
                text.innerHTML = 'text shrinking';
                text.style.color = 'blue';
                size -= 5;
                text.style.fontSize = size + "px";

                if (size < 5) 
                    growing = true;
            }
        }
        setInterval(animateText, 1000);
    </script>
</body>
</html>

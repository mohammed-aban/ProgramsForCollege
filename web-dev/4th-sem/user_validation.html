<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <style>
        .error {
            color: red;
            font-size: 14px;
        }

        .success {
            color: green;
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h2>User Registration</h2>
    <form id="regForm">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name">
        <span id="NameError" class="error"></span>
        <br><br>

        <label for="qualification">Qualification:</label>
        <input type="text" id="qualification">
        <br><br>

        <label for="hobby">Hobbies:</label>
        <input type="checkbox" id="hobby" name="hobby" value="Chess">Chess
        <input type="checkbox" id="hobby" name="hobby" value="Sudoku">Sudoku
        <input type="checkbox" id="hobby" name="hobby" value="Reading">Reading
        <br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email">
        <span id="EmailError" class="error"></span>
        <br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password">
        <span id="PassError" class="error"></span>
        <br><br>

        <label for="confirmpassword">Confirm Password:</label>
        <input type="password" id="confirmpassword" name="confirmpassword">
        <span id="ConfirmPasswordError" class="error"></span>
        <br><br>

        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" name="phone">
        <span id="PhoneError" class="error"></span>
        <br><br>

        <label for="gender">Gender:</label>
        <input type="radio" id="gender" name="gender" value="Male"> Male
        <input type="radio" id="gender" name="gender" value="Female"> Female
        <br><br>

        <button type="submit">Register</button>
    </form>

    <div id="SuccessMessage" class="success"></div>

    <script>
        document.getElementById("regForm").addEventListener("submit", function (e) {
            var valid = true;

            var errors = document.querySelectorAll(".error");
            for (var i = 0; i < errors.length; i++) {
                errors[i].innerHTML = "";
            }
            document.getElementById("SuccessMessage").innerHTML = "";

            // NAME: just check it's not empty (no regex needed)
            var name = document.getElementById("name").value;
            if (name === "") {
                document.getElementById("NameError").innerHTML = "Name is required";
                valid = false;
            }

            // EMAIL: anything @ anything . anything
            // Memory tip: \S+ means "no spaces", so: noSpace@noSpace.noSpace
            var email = document.getElementById("email").value;
            var emailPattern = /^\S+@\S+\.\S+$/;
            if (!emailPattern.test(email)) {
                document.getElementById("EmailError").innerHTML = "Invalid Email";
                valid = false;
            }

            // PASSWORD: must have lowercase, uppercase, digit, and '@', min 6 chars
            // Memory tip: 4 lookaheads (?=.*x) one for each rule, then .{6,}
            var password = document.getElementById("password").value;
            var passwordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9])(?=.*@).{6,}$/;
            if (!passwordPattern.test(password)) {
                document.getElementById("PassError").innerHTML =
                    "Password must contain at least one lowercase, one uppercase, one number, and '@'";
                valid = false;
            }

            // CONFIRM PASSWORD: simple string comparison, no regex
            var confirm = document.getElementById("confirmpassword").value;
            if (password !== confirm) {
                document.getElementById("ConfirmPasswordError").innerHTML = "Passwords do not match";
                valid = false;
            }

            // PHONE: exactly 10 digits
            // Memory tip: \d = digit, {10} = exactly 10
            var phone = document.getElementById("phone").value;
            var phonePattern = /^\d{10}$/;
            if (!phonePattern.test(phone)) {
                document.getElementById("PhoneError").innerHTML = "Enter 10 digit number";
                valid = false;
            }

            if (!valid) {
                e.preventDefault();
            } else {
                e.preventDefault();
                document.getElementById("SuccessMessage").innerHTML = "Registration Successful!";
            }
        });
    </script>
</body>

</html>
